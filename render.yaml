services:
  - type: web
    name: agriadvisor-backend
    env: python
    pythonVersion: "3.10"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app --bind 0.0.0.0:$PORT --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SQLALCHEMY_DATABASE_URI
        value: sqlite:///agri.db
      - key: PYTHON_VERSION
        value: 3.10.13
